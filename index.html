<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Answer Button</title>
    <!-- Importing a clean, standard LMS font from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        .small-btn {
            background-color: #532A8C;
            color: #FFFFFF;
            border: none;
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Open Sans', Arial, sans-serif;
            font-weight: 600;
        }
        .small-btn:hover {
            opacity: 0.9;
        }
        #answer-text {
            display: none;
            margin-left: 10px;
            font-family: 'Open Sans', Arial, sans-serif;
            font-size: 15px;
            color: #333333;
        }
    </style>
</head>
<body>

    <button id="checkBtn" class="small-btn">Check answer</button>
    <span id="answer-text">Scissors - they are closed. There is also too much content to allow for steam expansion (packs actually "blow out").</span>

    <script>
        document.getElementById('checkBtn').addEventListener('click', function() {
            document.getElementById('answer-text').style.display = 'inline';
        });
    </script>

</body>
</html>
